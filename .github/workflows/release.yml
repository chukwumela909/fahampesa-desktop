name: Build desktop release

# Builds the distributable installers on GitHub's runners (a Windows installer
# can't be produced from macOS). Trigger by pushing a version tag (v0.1.6) or
# manually from the Actions tab. Download the artifacts from the run page and
# upload them to Backblaze.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: windows-x64
            bundles: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - platform: macos-latest
            name: macos-aarch64
            bundles: |
              src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: fahampesa-${{ matrix.name }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error
